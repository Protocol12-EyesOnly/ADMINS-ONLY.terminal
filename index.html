<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F.A.C.S. TERMINAL v12.7.4 | PROTOCOL 12</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --accent-primary: #58a6ff;
            --accent-secondary: #79c0ff;
            --accent-danger: #f85149;
            --accent-warning: #d29922;
            --accent-success: #3fb950;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --border-color: #30363d;
            --glow-primary: rgba(88, 166, 255, 0.3);
            --glow-danger: rgba(248, 81, 73, 0.3);
        }
        
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', 'Inter', monospace;
            height: 100vh;
            overflow: hidden;
            position: relative;
            line-height: 1.6;
        }
        
        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(88, 166, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(88, 166, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }
        
        /* Ambient glow */
        .ambient-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--glow-primary) 0%, transparent 70%);
            top: -300px;
            right: -300px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }
        
        /* Main container */
        .terminal-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 24px;
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* Header */
        .header {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-primary), transparent);
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .logo-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--accent-primary);
            font-size: 1.2em;
            position: relative;
        }
        
        .logo-icon::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--accent-success);
            border-radius: 50%;
            bottom: 4px;
            right: 4px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        
        .logo-text h1 {
            font-size: 1.25em;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            margin-bottom: 2px;
        }
        
        .logo-text span {
            font-size: 0.75em;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .status-bar {
            display: flex;
            gap: 24px;
            font-size: 0.85em;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
        }
        
        .status-item .label {
            color: var(--text-muted);
        }
        
        .status-item .value {
            color: var(--accent-primary);
            font-weight: 500;
        }
        
        .status-item .value.alert {
            color: var(--accent-danger);
            animation: blink 2s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Main content area */
        .main-content {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            overflow-y: auto;
            margin-bottom: 16px;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        /* Custom scrollbar */
        .main-content::-webkit-scrollbar {
            width: 10px;
        }
        
        .main-content::-webkit-scrollbar-track {
            background: var(--bg-primary);
            border-radius: 5px;
        }
        
        .main-content::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 5px;
            border: 2px solid var(--bg-secondary);
        }
        
        .main-content::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
        
        /* Output styling */
        .output {
            font-size: 14px;
            line-height: 1.7;
        }
        
        .command-line-entry {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .command-line-entry:last-child {
            border-bottom: none;
        }
        
        .command-prompt {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            color: var(--text-muted);
            font-size: 0.9em;
        }
        
        .prompt-symbol {
            color: var(--accent-primary);
            font-weight: 700;
        }
        
        .command-text {
            color: var(--text-primary);
            font-weight: 500;
        }
        
        /* Content cards */
        .content-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-top: 12px;
        }
        
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .card-title {
            font-size: 1.1em;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .badge-classified {
            background: rgba(248, 81, 73, 0.15);
            color: var(--accent-danger);
            border: 1px solid rgba(248, 81, 73, 0.3);
        }
        
        .badge-omega {
            background: rgba(88, 166, 255, 0.15);
            color: var(--accent-primary);
            border: 1px solid rgba(88, 166, 255, 0.3);
        }
        
        /* Data grid */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin: 16px 0;
        }
        
        .data-item {
            background: var(--bg-secondary);
            padding: 12px 16px;
            border-radius: 6px;
            border-left: 3px solid var(--accent-primary);
        }
        
        .data-item.danger {
            border-left-color: var(--accent-danger);
        }
        
        .data-item.warning {
            border-left-color: var(--accent-warning);
        }
        
        .data-label {
            font-size: 0.75em;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        
        .data-value {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.95em;
        }
        
        /* Lists */
        .feature-list {
            list-style: none;
            margin: 12px 0;
        }
        
        .feature-list li {
            padding: 8px 0;
            padding-left: 24px;
            position: relative;
            color: var(--text-secondary);
        }
        
        .feature-list li::before {
            content: '›';
            position: absolute;
            left: 8px;
            color: var(--accent-primary);
            font-weight: 700;
        }
        
        /* Audio log styling */
        .audio-log {
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 20px;
            margin-top: 12px;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .log-header {
            display: flex;
            gap: 24px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.85em;
            flex-wrap: wrap;
        }
        
        .log-entry {
            margin: 12px 0;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 6px;
            border-left: 3px solid transparent;
        }
        
        .log-entry.speaker-director {
            border-left-color: var(--accent-primary);
        }
        
        .log-entry.speaker-colonel {
            border-left-color: var(--accent-warning);
        }
        
        .log-entry.speaker-security {
            border-left-color: var(--accent-danger);
        }
        
        .log-entry.speaker-control {
            border-left-color: var(--accent-success);
        }
        
        .log-speaker {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 0.9em;
        }
        
        .log-text {
            color: var(--text-secondary);
            line-height: 1.6;
        }
        
        .log-alert {
            color: var(--accent-danger);
            font-weight: 600;
            text-align: center;
            padding: 8px;
            margin: 8px 0;
            background: rgba(248, 81, 73, 0.1);
            border-radius: 4px;
        }
        
        /* Command input area */
        .input-area {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }
        
        .input-prompt {
            color: var(--accent-primary);
            font-weight: 700;
            font-size: 1.1em;
            user-select: none;
        }
        
        .command-input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            flex: 1;
            outline: none;
            caret-color: var(--accent-primary);
        }
        
        .command-input::placeholder {
            color: var(--text-muted);
        }
        
        /* Footer */
        .footer {
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            color: var(--text-muted);
        }
        
        .footer-left, .footer-right {
            display: flex;
            gap: 16px;
        }
        
        .footer-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-success);
        }
        
        .status-dot.alert {
            background: var(--accent-danger);
            animation: pulse 2s infinite;
        }
        
        /* Boot sequence */
        .boot-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }
        
        .boot-content {
            max-width: 600px;
            width: 100%;
        }
        
        .boot-logo {
            font-size: 2em;
            font-weight: 700;
            color: var(--accent-primary);
            margin-bottom: 32px;
            text-align: center;
            letter-spacing: 2px;
        }
        
        .boot-line {
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9em;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .boot-line.success::before {
            content: '✓';
            color: var(--accent-success);
            font-weight: 700;
        }
        
        .boot-line.processing::before {
            content: '◉';
            color: var(--accent-primary);
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        .boot-progress {
            width: 100%;
            height: 2px;
            background: var(--border-color);
            margin-top: 32px;
            border-radius: 1px;
            overflow: hidden;
        }
        
        .boot-progress-bar {
            height: 100%;
            background: var(--accent-primary);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* Welcome screen */
        .welcome-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        
        .welcome-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .welcome-card:hover {
            border-color: var(--accent-primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(88, 166, 255, 0.1);
        }
        
        .welcome-card h3 {
            font-size: 0.9em;
            color: var(--accent-primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .welcome-card p {
            font-size: 0.85em;
            color: var(--text-secondary);
        }
        
        /* Error message */
        .error-message {
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid rgba(248, 81, 73, 0.3);
            border-radius: 6px;
            padding: 12px 16px;
            color: var(--accent-danger);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .error-icon {
            font-size: 1.2em;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .terminal-container {
                padding: 12px;
            }
            
            .header-top {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .status-bar {
                flex-direction: column;
                gap: 8px;
                width: 100%;
            }
            
            .data-grid {
                grid-template-columns: 1fr;
            }
            
            .footer {
                flex-direction: column;
                gap: 8px;
            }
        }
        
        /* Selection color */
        ::selection {
            background: rgba(88, 166, 255, 0.3);
            color: var(--text-primary);
        }
    </style>
</head>

                        </div>
                        <div class="welcome-card" onclick="simulateCommand('READ://PROJECTANCHOR')">
                            <h3>🔬 Project Anchor</h3>
                            <p>Generation units and R-12 research</p>
                        </div>
                        <div class="welcome-card" onclick="simulateCommand('READ://FACS')">
                            <h3>🌐 F.A.C.S. Network</h3>
                            <p>Global monitoring status</p>
                        </div>
                    </div>
                    
                    <div style="margin-top: 20px; padding: 12px; background: var(--bg-primary); border-radius: 6px; font-size: 0.85em; color: var(--text-muted);">
                        Type <code style="background: var(--bg-secondary); padding: 2px 6px; border-radius: 3px; color: var(--accent-primary);">HELP</code> for all available commands or click any card above.
                    </div>
                </div>
            `;
            
            output.innerHTML = welcomeHTML;
        }

        function simulateCommand(cmd) {
            document.getElementById('commandInput').value = cmd;
            processCommand(cmd);
        }

        // Command processing
        const commandInput = document.getElementById('commandInput');
        const output = document.getElementById('output');
        const mainContent = document.getElementById('mainContent');

        commandInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const command = this.value.trim().toUpperCase();
                this.value = '';
                processCommand(command);
            }
        });

        function processCommand(command) {
            // Add command to output
            const entry = document.createElement('div');
            entry.className = 'command-line-entry';
            entry.innerHTML = `
                <div class="command-prompt">
                    <span class="prompt-symbol">❯</span>
                    <span class="command-text">${command}</span>
                </div>
            `;
            
            // Remove empty state if exists
            if (output.children.length === 1 && output.children[0].querySelector('.welcome-grid')) {
                output.innerHTML = '';
            }
            
            if (command === 'CLEAR') {
                output.innerHTML = '';
                return;
            } else if (command === 'TIME') {
                const now = new Date();
                entry.innerHTML += `
                    <div class="content-card">
                        <div class="data-grid" style="grid-template-columns: repeat(2, 1fr); margin: 0;">
                            <div>
                                <div class="data-label">UTC Time</div>
                                <div class="data-value">${now.toISOString()}</div>
                            </div>
                            <div>
                                <div class="data-label">Local Time</div>
                                <div class="data-value">${now.toLocaleString()}</div>
                            </div>
                        </div>
                    </div>
                `;
            } else if (command === 'HELP') {
                entry.innerHTML += `
                    <div class="content-card">
                        <div class="data-label" style="margin-bottom: 12px;">AVAILABLE COMMANDS</div>
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; font-size: 0.9em;">
                            <code style="color: var(--accent-primary);">READ://PROTOCOL12</code>
                            <code style="color: var(--accent-primary);">READ://SOURCES</code>
                            <code style="color: var(--accent-primary);">READ://DOSSIER</code>
                            <code style="color: var(--accent-primary);">READ://TIMELINE</code>
                            <code style="color: var(--accent-primary);">READ://FACS</code>
                            <code style="color: var(--accent-primary);">READ://OBJECT0</code>
                            <code style="color: var(--accent-primary);">READ://PROJECTANCHOR</code>
                            <code style="color: var(--accent-primary);">READ://TIMELINE/XM5-34T-GHR56-371</code>
                            <code style="color: var(--accent-primary);">READ://TIMELINE/HT9-07B-TLA12-891</code>
                            <code style="color: var(--accent-primary);">READ://TIMELINE/TY2-47H-UHT01-502</code>
                            <code style="color: var(--text-secondary);">CLEAR</code>
                            <code style="color: var(--text-secondary);">TIME</code>
                        </div>
                    </div>
                `;
            } else if (database[command]) {
                const data = database[command];
                entry.innerHTML += `
                    <div class="content-card">
                        <div class="card-header">
                            <div class="card-title">
                                ${data.title}
                                <span class="badge badge-${data.badge}">${data.badge}</span>
                            </div>
                        </div>
                        ${data.content}
                    </div>
                `;
            } else if (command === '') {
                return;
            } else {
                entry.innerHTML += `
                    <div class="error-message">
                        <span class="error-icon">⚠</span>
                        <div>
                            <div style="font-weight: 600;">Unknown Command</div>
                            <div style="font-size: 0.9em; opacity: 0.8;">"${command}" is not recognized. Type HELP for available commands.</div>
                        </div>
                    </div>
                `;
            }
            
            output.appendChild(entry);
            mainContent.scrollTop = mainContent.scrollHeight;
        }

        // Auto-focus input
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.command-input')) {
                commandInput.focus();
            }
        });
    </script>
</body>
</html>
